<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Compras Familiares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <i class="fas fa-home"></i><span>Inicio</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-shopping-basket"></i><span>Compras</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-chart-bar"></i><span>Estadísticas</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-cog"></i><span>Config</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-sign-out-alt"></i><span>Salir</span>
                </a>
            </div>
        </nav>

        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-shopping-cart"></i> Compras Familiares</h1>
            <div class="user-info">
                <div>
                    <div class="user-name" id="user-name">Cargando...</div>
                    <div class="family-name" id="family-name">Cargando...</div>
                </div>
                <button class="logout-btn" id="btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div id="page-inicio" class="page-section"></div>
            <div id="page-compras" class="page-section"></div>
            <div id="page-estadisticas" class="page-section"></div>
            <div id="page-configuracion" class="page-section"></div>
        </main>
    </div>

    <!-- FAB -->
    <button class="fab" title="Añadir compra rápida"><i class="fas fa-plus"></i></button>

    <!-- Modal: Seleccionar Tienda -->
    <div id="modal-dia-tienda" class="modal">
        <div class="modal-content" style="max-width:480px">
            <div class="modal-header">
                <h3><i class="fas fa-store"></i> Seleccionar Tienda</h3>
                <span class="close" data-close-modal>&times;</span>
            </div>
            <div class="modal-body">
                <p id="modal-dia-fecha" style="font-weight:600;margin-bottom:16px;color:var(--text)"></p>
                <div class="tienda-lista">
                    <div class="tienda-item">
                        <i class="fas fa-shopping-cart"></i>
                        <div class="tienda-nombre">Mercadona</div>
                        <div class="tienda-descripcion">Supermercado</div>
                    </div>
                    <div class="tienda-item">
                        <i class="fas fa-shopping-basket"></i>
                        <div class="tienda-nombre">Lidl</div>
                        <div class="tienda-descripcion">Descuentos</div>
                    </div>
                    <div class="tienda-item">
                        <i class="fas fa-store"></i>
                        <div class="tienda-nombre">Carrefour</div>
                        <div class="tienda-descripcion">Hipermercado</div>
                    </div>
                    <div class="tienda-item">
                        <i class="fas fa-shopping-bag"></i>
                        <div class="tienda-nombre">Dia</div>
                        <div class="tienda-descripcion">Supermercado</div>
                    </div>
                    <div class="tienda-item">
                        <i class="fas fa-tag"></i>
                        <div class="tienda-nombre">Aldi</div>
                        <div class="tienda-descripcion">Bajo precio</div>
                    </div>
                    <div class="tienda-item">
                        <i class="fas fa-ellipsis-h"></i>
                        <div class="tienda-nombre">Otro</div>
                        <div class="tienda-descripcion">Personalizado</div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="nombre-tienda-personalizada">Nombre de la tienda:</label>
                    <input type="text" id="nombre-tienda-personalizada" placeholder="Tu comercio...">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" data-close-modal>Cancelar</button>
                <button class="btn btn-primary" id="btn-confirmar-tienda" disabled>Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Gestión de Cestas -->
    <div id="modal-gestion-cestas" class="modal">
        <div class="modal-content" style="max-width:520px">
            <div class="modal-header">
                <h3><i class="fas fa-shopping-basket"></i> Cestas del día</h3>
                <span class="close" data-close-modal>&times;</span>
            </div>
            <div class="modal-body">
                <div class="cestas-container" id="cestas-container"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" data-close-modal>Cerrar</button>
                <button class="btn btn-primary" id="btn-nueva-cesta"><i class="fas fa-plus"></i> Nueva Cesta</button>
            </div>
        </div>
    </div>

    <!-- Modal: Añadir Producto -->
    <div id="modal-producto" class="modal">
        <div class="modal-content" style="max-width:480px">
            <div class="modal-header">
                <h3><i class="fas fa-plus-circle"></i> Añadir Producto</h3>
                <span class="close" data-close-modal>&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="modal-nombre">Producto *</label>
                    <input type="text" id="modal-nombre" placeholder="Ej: Leche, Pan..." required list="productos-sugeridos" autocomplete="off">
                    <datalist id="productos-sugeridos"></datalist>
                </div>
                <div class="form-group">
                    <label for="modal-cantidad">Cantidad</label>
                    <input type="number" id="modal-cantidad" min="1" value="1">
                </div>
                <div class="form-group">
                    <label for="modal-precio">Precio estimado (€)</label>
                    <input type="number" id="modal-precio" min="0" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="modal-categoria">Categoría</label>
                    <select id="modal-categoria">
                        <option value="General">General</option>
                        <option value="Frutas">Frutas</option>
                        <option value="Verduras">Verduras</option>
                        <option value="Carnes">Carnes</option>
                        <option value="Pescado">Pescado</option>
                        <option value="Lácteos">Lácteos</option>
                        <option value="Panadería">Panadería</option>
                        <option value="Bebidas">Bebidas</option>
                        <option value="Limpieza">Limpieza</option>
                        <option value="Congelados">Congelados</option>
                        <option value="Despensa">Despensa</option>
                        <option value="Personal">Personal</option>
                        <option value="Mascotas">Mascotas</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>
                <div class="form-group">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="modal-urgente">
                        <label for="modal-urgente">Urgente</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" data-close-modal>Cancelar</button>
                <button class="btn btn-primary" id="btn-guardar-producto"><i class="fas fa-plus"></i> Añadir</button>
            </div>
        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
